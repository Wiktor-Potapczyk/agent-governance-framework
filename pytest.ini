[pytest]
# Hooks under hooks/disabled/ ship opt-in / unregistered and are NOT part of the
# default enforcement set, so their tests must not gate the default suite (a clean
# clone should run green). They are excluded from default collection here.
#
# To run the disabled-hook tests deliberately, override this flag:
#   python -m pytest hooks/disabled/ --override-ini="addopts="
addopts = --ignore=hooks/disabled
