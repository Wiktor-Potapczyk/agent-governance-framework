# Documentation + framework quality gates.
#
# SCOPE: this CI runs AFTER a push to main (this repo uses a main-only,
# direct-push flow — no pull-request gate). It is therefore a POST-PUSH
# TRIPWIRE that surfaces problems for follow-up, NOT a pre-merge preventer.
#
# It deliberately does NO secret/NDA scanning: an NDA token list cannot live
# in a public repo (it would publish the very identifiers it guards), and a
# match printed to a public build log would re-leak it. NDA safety is enforced
# entirely by a local pre-push gate that never leaves the author's machine.
# This workflow only checks PUBLIC-SAFE quality signals.
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Doc-consistency (cross-referenced counts vs on-disk source)
        run: |
          if [ -f .doc-consistency.json ]; then
            python skills/core/doc-consistency/check_doc_consistency.py .doc-consistency.json
          else
            echo "no .doc-consistency.json — skipping"
          fi

      - name: Internal Markdown link integrity
        run: |
          python - <<'PY'
          import os, re, sys, glob
          broken = []
          for md in glob.glob('**/*.md', recursive=True):
              if '/.git/' in md: continue
              with open(md, encoding='utf-8') as fh:
                  txt = fh.read()
              # strip fenced code blocks + inline code spans so literal
              # `](path)` examples in docs are not parsed as real links
              txt = re.sub(r'```.*?```', '', txt, flags=re.S)
              txt = re.sub(r'`[^`\n]*`', '', txt)
              base = os.path.dirname(md)
              for link in re.findall(r'\]\((?!https?://|#|mailto:)([^)]+?)\)', txt):
                  target = link.split('#')[0].strip()
                  if not target:
                      continue
                  resolved = os.path.normpath(os.path.join(base, target))
                  if not os.path.exists(resolved):
                      broken.append(f"{md} -> {link}")
          if broken:
              print(f"{len(broken)} broken internal link(s):")
              for b in broken: print("  " + b)
              sys.exit(1)
          print("internal Markdown links OK")
          PY

      - name: Validate JSON config templates
        run: |
          python - <<'PY'
          import json, glob, sys
          bad = []
          for f in glob.glob('**/*.json', recursive=True) + glob.glob('**/*.json.example', recursive=True):
              if '/.git/' in f: continue
              try:
                  with open(f, encoding='utf-8') as fh: json.load(fh)
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("invalid JSON:")
              for b in bad: print("  " + b)
              sys.exit(1)
          print("all JSON valid")
          PY

      # NOTE: the hooks/test_*.py suite is intentionally NOT run here. Those
      # tests verify a live governance environment (a populated registry, the
      # maintainer's agent/skill inventory, settings state) that does not exist
      # in this framework-only public repo, so they cannot pass standalone. They
      # run in the maintainer's own environment, not in public CI. Public CI
      # validates only what is self-contained in this repo: doc consistency,
      # link integrity, and JSON validity (the steps above).
